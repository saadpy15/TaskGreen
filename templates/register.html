<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TaskGreen - Register System Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f2fbf5; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .register-card {
            background-color: #ffffff; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            padding: 40px; width: 100%; max-width: 400px;
            box-sizing: border-box; text-align: center;
        }
        .logo-box { margin-bottom: 25px; }
        .logo-box img { max-width: 180px; height: auto; }
        h2 { font-size: 24px; color: #2c3e50; margin-bottom: 25px; font-weight: 600; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 14px; color: #7f8c8d; margin-bottom: 8px; font-weight: 500; }
        .input-field { width: 100%; padding: 12px; border: 1px solid #bdc3c7; border-radius: 6px; font-family: 'Montserrat', sans-serif; font-size: 15px; box-sizing: border-box; color: #2c3e50; background-color: #ffffff; }
        .input-field:focus { outline: none; border-color: #27ae60; }
        .btn-submit { width: 100%; background-color: #3498db; color: white; border: none; padding: 14px; font-size: 16px; font-weight: 700; border-radius: 6px; cursor: pointer; transition: background-color 0.2s; margin-top: 10px; }
        .btn-submit:hover { background-color: #2980b9; }
        .footer-links { margin-top: 25px; font-size: 14px; color: #34495e; }
        .footer-links a { color: #27ae60; text-decoration: none; font-weight: 600; }
        .footer-links a:hover { text-decoration: underline; }
        .flash-msg { padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; font-weight: 500; text-align: left; }
        .flash-error { background-color: #fde8e8; color: #c0392b; border: 1px solid #f8b4b4; }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="logo-box">
            <img src="{{ url_for('static', filename=logo_img) }}" alt="TaskGreen Logo">
        </div>
        <h2>Create Eco Account</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="flash-msg flash-{{ category }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form action="{{ url_for('register') }}" method="POST">
            <div class="form-group">
                <label for="username">Choose Username</label>
                <input type="text" id="username" name="username" class="input-field" placeholder="Create username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="input-field" placeholder="Enter valid email address" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">Create Password</label>
                <input type="password" id="password" name="password" class="input-field" placeholder="Create secure password" required>
            </div>
            <div class="form-group">
                <label for="user_group">Assign Operational Group</label>
                <select id="user_group" name="user_group" class="input-field">
                    <option value="All">All Operations (Default)</option>
                    <option value="Tree-Planting Branch">Tree-Planting Branch</option>
                    <option value="Waste-Management Team">Waste-Management Team</option>
                </select>
            </div>
            <button type="submit" class="btn-submit">Send Verification Code</button>
        </form>
        <div class="footer-links">
            Already have an eco-profile? <a href="{{ url_for('login') }}">Sign In Instead</a>
        </div>
    </div>
</body>
</html>
